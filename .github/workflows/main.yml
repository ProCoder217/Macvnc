name: "Build macOS CLI (DarlingHQ Path)"

on:
  workflow_dispatch:

jobs:
  darling-nuitka:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Install Darling
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip
        wget https://github.com/darlinghq/darling/releases/download/v0.1.20260222/debs_20260222.zip
        unzip debs_20260222.zip
        sudo apt install -y ./debs/*.deb

    - name: 🐍 Download & Install macOS Python
      run: |
        # 1. Download on the Ubuntu HOST (Faster and more reliable)
        curl -L -o python-install.pkg https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg
        
        # 2. Move it into the Darling prefix so Darling can see it
        mkdir -p ~/.darling/tmp
        cp python-install.pkg ~/.darling/tmp/
        
        # 3. Run the installer inside Darling
        # We use /tmp/python-install.pkg because ~/.darling maps to / inside the shell
        darling shell "installer -pkg /tmp/python-install.pkg -target /"

    - name: 🔨 Install Nuitka & Compile
      run: |
        # Ensure pip is up to date inside Darling
        darling shell "python3 -m pip install --upgrade pip"
        darling shell "python3 -m pip install nuitka"
        
        # Copy your script into the prefix
        cp main.py ~/.darling/tmp/
        
        echo "Starting Nuitka compilation..."
        # We CD to /tmp inside Darling where the file is
        darling shell "cd /tmp && python3 -m nuitka --standalone --onefile -o my_mac_tool main.py"

    - name: 📤 Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: macos-binary-from-darling
        path: ~/.darling/tmp/my_mac_tool
