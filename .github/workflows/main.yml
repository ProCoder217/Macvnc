name: "Build macOS CLI (DarlingHQ Path)"

on:
  workflow_dispatch:

jobs:
  darling-nuitka:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Install Darling
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip
        wget https://github.com/darlinghq/darling/releases/download/v0.1.20260222/debs_20260222.zip
        unzip debs_20260222.zip
        sudo apt install -y ./debs/*.deb || echo "Continuing despite minor install errors..."

    - name: 🐍 Install macOS Python 3 inside Darling
      run: |
        # Downloading the official macOS installer from python.org
        # We use a version compatible with macOS 11 (which Darling emulates)
        darling shell "curl -L -O https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
        
        # Use the macOS native installer command inside Darling
        darling shell "installer -pkg python-3.11.9-macos11.pkg -target /"

    - name: 🔨 Install Nuitka & Build
      run: |
        # Install Nuitka using the macOS Python we just installed
        darling shell "python3 -m pip install nuitka"
        
        # Build your app (Replace main.py with your file)
        # Nuitka will attempt to find 'clang' inside the Darling environment
        darling shell "python3 -m nuitka --standalone --onefile -o my_mac_tool main.py"

    - name: 📤 Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: macos-darling-binary
        # We locate the file inside the Darling prefix
        path: ~/.darling/home/runner/my_mac_tool
