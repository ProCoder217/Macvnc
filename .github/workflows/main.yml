name: "Fast macOS GUI (Tart VM)"

on:
  workflow_dispatch:

jobs:
  tart-mac:
    runs-on: macos-14 # Must use macos-14 for Apple Silicon
    steps:
    - name: 🍏 Install Tart & Pull macOS Image
      run: |
        brew install cirruslabs/cli/tart
        echo "Downloading macOS Sonoma image..."
        tart pull ghcr.io/cirruslabs/macos-sonoma-base:latest
        tart clone ghcr.io/cirruslabs/macos-sonoma-base:latest gui-mac

    - name: 🚀 Boot VM & Start Tunnel (Bore)
      run: |
        brew install bore-cli
        
        # Boot the Mac VM in the background with VNC exposed on port 5900
        tart run --vnc gui-mac &
        
        echo "------------------------------------------------"
        echo "🔗 TUNNEL IS STARTING..."
        echo "👤 USERNAME: admin"
        echo "🔑 PASSWORD: admin"
        echo "------------------------------------------------"
        
        # Tunnel the VM's VNC port to the internet
        bore local 5900 --to bore.pub
